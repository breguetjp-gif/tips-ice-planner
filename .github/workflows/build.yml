name: build-apps
# Windows版のビルドのみCIで行う（Mac版は署名・公証が要るため常にローカルの build_release.command で作成）。
#
# 成果物は Actions artifact ではなく **そのタグ自身のリリース** に添付して受け渡す。
#   · Actions artifact はアカウント単位の保存容量クォータ(0.5GB)を共有していて、繰り返しビルドすると
#     すぐ枯渇した（2026-06-14以降Windows版CIが一度も成功していなかった原因）。Release asset は対象外。
#   · 以前は `windows-build` という毎回上書きのローリング・リリースに上げていた。これはやめた:
#     Zenodo は **リリースが作られるたび** にリポジトリを丸ごとアーカイブして版を切る。ローリング・リリースが
#     一度でも作られると、それが「最新版」として concept DOI を奪い、論文の引用先が
#     「タグ付きリリース」ではなく「上書き中のWindowsビルド」を指してしまう（実際に起きた）。
#   · タグ付きリリースへの添付なら Zenodo は発火しない（`--clobber` は release:edited であって published ではない）。
#     exe とソースが同じ版で対応するので、再現性の面でも正しい。
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "添付先のリリースタグ（例: v0.5.0）"
        required: true
  push:
    tags: ['v*']
permissions:
  contents: write   # gh release upload に必要
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build
        working-directory: app
        run: pyinstaller --noconfirm tips_ice.spec
      - name: Zip build
        working-directory: app
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/TIPS ICE Planner" -DestinationPath "dist/TIPS-ICE-Planner-Windows.zip" -Force
      - name: Attach the build to its own tagged release
        working-directory: app
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release upload "$TAG" "dist/TIPS-ICE-Planner-Windows.zip" --clobber
          echo "attached TIPS-ICE-Planner-Windows.zip to $TAG"
