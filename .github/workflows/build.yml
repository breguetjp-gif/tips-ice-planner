name: build-apps
# Windows版のビルドのみCIで行う（Mac版は署名・公証が要るため常にローカルの build_release.command で作成）。
# 成果物は Actions artifact ではなく GitHub Release(タグ windows-build を毎回上書き)で受け渡す。
# 理由: Actions artifact はアカウント単位の保存容量クォータ(private repoは0.5GB)を共有しており、
# retention-days短縮後も繰り返しビルドするとすぐ再度枯渇した（先生報告「Windowsの自動更新が機能しない」の
# 調査で、実際に2026-06-14以降Windows版CIが一度も成功していなかったと判明）。Release assetはこのクォータ対象外。
on:
  workflow_dispatch:
  push:
    tags: ['v*']
permissions:
  contents: write   # gh release create/upload に必要
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build
        working-directory: app
        run: pyinstaller --noconfirm tips_ice.spec
      - name: Zip build
        working-directory: app
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/TIPS ICE Planner" -DestinationPath "dist/TIPS-ICE-Planner-Windows.zip" -Force
      - name: Publish to rolling release (avoids Actions artifact storage quota)
        working-directory: app
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view windows-build >/dev/null 2>&1; then
            gh release upload windows-build "dist/TIPS-ICE-Planner-Windows.zip" --clobber
          else
            gh release create windows-build "dist/TIPS-ICE-Planner-Windows.zip" \
              --title "Windows build (rolling, latest)" \
              --notes "Latest Windows CI build off main. This release is overwritten on every build.yml run; not a versioned release." \
              --prerelease
          fi
